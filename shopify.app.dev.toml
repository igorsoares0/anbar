# Configuração para desenvolvimento local
# Use: shopify app dev --config=shopify.app.dev.toml
#
# IMPORTANTE: Substitua o client_id pelo Client ID do seu app de desenvolvimento
# criado no Partner Dashboard (https://partners.shopify.com)

client_id = "835f1569f02499bd11de2a6e7a0477fa"
name = "anbar-dev"
handle = "anbar-dev"
application_url = "https://localhost"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  # Mandatory GDPR compliance webhooks
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
scopes = "write_products"

[auth]
redirect_urls = ["https://localhost/auth/callback", "https://localhost/auth/shopify/callback", "https://localhost/api/auth/callback"]

[app_proxy]
url = "https://localhost/api"
subpath = "anbar"
prefix = "apps"

[pos]
embedded = false
